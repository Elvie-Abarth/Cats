name: .NET API CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Hent kildekode
      uses: actions/checkout@v4

    - name: Opsæt .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Byg koden
      run: dotnet build --no-restore

    - name: Kør Unit Tests
      run: dotnet test --no-build --verbosity normal

    - name: Start API i baggrunden
      run: dotnet run --project RESTcats/RESTcats.csproj &
      env:
        ASPNETCORE_URLS: http://localhost:5000

    - name: Vent på at API'et er klar
      run: sleep 10

    - name: Installer Newman (Postman CLI)
      run: npm install -g newman

    - name: Kør Postman Tests
      run: newman run "RESTcats/My Collection.postman_collection.json" --env-var "baseUrl=http://localhost:5000"
